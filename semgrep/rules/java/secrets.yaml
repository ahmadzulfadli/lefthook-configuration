# =============================================================================
# Semgrep Custom Rules - Hardcoded Secrets & Credentials
# Untuk Java/Spring Boot projects
# Ref: https://cwe.mitre.org/data/definitions/798.html
# =============================================================================
rules:
  # ---------------------------------------------------------------------------
  # Hardcoded Password in String
  # ---------------------------------------------------------------------------
  - id: java-hardcoded-password
    patterns:
      - pattern-either:
          - pattern: |
              String $VAR = "...";
          - pattern: |
              private String $VAR = "...";
          - pattern: |
              private static final String $VAR = "...";
      - metavariable-regex:
          metavariable: $VAR
          regex: "(?i).*(password|passwd|pwd|secret|api_?key|apikey|token|auth_?token|access_?key|private_?key).*"
      - pattern-not: |
          String $VAR = "";
      - pattern-not: |
          String $VAR = "changeme";
      - pattern-not: |
          String $VAR = "${...}";
    message: >
      Hardcoded credential terdeteksi di variabel '$VAR'.
      Gunakan environment variable atau secret manager (AWS Secrets Manager, Vault).
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
  # Hardcoded in application.properties/yml
  # ---------------------------------------------------------------------------
  - id: spring-hardcoded-credential-properties
    patterns:
      - pattern-regex: "(?i)(password|secret|api[_-]?key|token)\\s*[=:]\\s*[^$\\{][^\\s]+"
    paths:
      include:
        - "*.properties"
        - "*.yml"
        - "*.yaml"
    message: >
      Credential tampaknya di-hardcode di config file.
      Gunakan ${ENV_VAR} atau spring-dotenv untuk inject dari environment.
    severity: ERROR
    languages: [generic]
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021 - Identification and Authentication Failures"
