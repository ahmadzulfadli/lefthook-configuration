# =============================================================================
# Semgrep Custom Rules - Code Quality & Error Handling
# For Java/Spring Boot projects
# Ref: - https://cwe.mitre.org/data/definitions/390.html
#      - https://docs.semgrep.dev/
# =============================================================================
rules:
  # ---------------------------------------------------------------------------
  # Empty catch block
  # ---------------------------------------------------------------------------
  - id: java-empty-catch-block
    patterns:
      - pattern: |
          try { ... } catch ($TYPE $EX) { }
    message: >
      Empty catch block detected. At minimum, log the exception or re-throw it.
      Silent failures make debugging in production extremely difficult.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-390"
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # System.out/err instead of logger
  # ---------------------------------------------------------------------------
  - id: java-use-logger-not-sysout
    patterns:
      - pattern-either:
          - pattern: |
              System.out.println(...);
          - pattern: |
              System.err.println(...);
          - pattern: |
              $EX.printStackTrace();
    message: >
      Use SLF4J/Logback logger instead of System.out/err or printStackTrace().
      A proper logger provides log levels, formatting, and output control.
    severity: ERROR
    languages: [java]
    metadata:
      confidence: HIGH
