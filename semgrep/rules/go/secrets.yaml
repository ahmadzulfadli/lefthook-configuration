# =============================================================================
# Semgrep Custom Rules - Hardcoded Secrets & Credentials (Go)
# For Go projects
# Ref: https://cwe.mitre.org/data/definitions/798.html
# =============================================================================
rules:
  # ---------------------------------------------------------------------------
  # Hardcoded credentials in Go variables
  # ---------------------------------------------------------------------------
  - id: go-hardcoded-credential
    patterns:
      - pattern-either:
          - pattern: |
              $VAR := "..."
          - pattern: |
              var $VAR = "..."
          - pattern: |
              var $VAR string = "..."
          - pattern: |
              const $VAR = "..."
          - pattern: |
              const $VAR string = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: "(?i).*(password|passwd|pwd|secret|api_?key|apikey|token|auth_?token|access_?key|private_?key|client_?secret|db_?pass).*"
      - pattern-not: |
          $VAR := ""
      - pattern-not: |
          var $VAR = ""
      - pattern-not: |
          $VAR := os.Getenv("...")
    message: >
      Hardcoded credential detected in variable '$VAR'.
      Use environment variables (os.Getenv), gitignored config files,
      or a secret manager (AWS Secrets Manager, HashiCorp Vault).
    severity: ERROR
    languages: [go]
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - A07:2021 - Identification and Authentication Failures
      references:
        - https://cwe.mitre.org/data/definitions/798.html
        - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
      category: security
      technology:
        - go
      likelihood: HIGH
      impact: HIGH
      confidence: MEDIUM
      subcategory:
        - vuln

  # ---------------------------------------------------------------------------
  # Hardcoded credentials passed to functions
  # ---------------------------------------------------------------------------
  - id: go-hardcoded-credential-in-func
    patterns:
      - pattern-either:
          - pattern: sql.Open($DRIVER, "...")
          - pattern: sqlx.Connect($DRIVER, "...")
          - pattern: sqlx.Open($DRIVER, "...")
          - pattern: gorm.Open($DIALECT, "...")
          - pattern: |
              redis.NewClient(&redis.Options{..., Password: "...", ...})
          - pattern: |
              mongo.Connect($CTX, options.Client().ApplyURI("..."))
      - pattern-not: sql.Open($DRIVER, "")
      - pattern-not: sqlx.Connect($DRIVER, "")
    message: >
      Connection string or credential is hardcoded directly in source code.
      Use environment variables or config files to store credentials.
    severity: ERROR
    languages: [go]
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - A07:2021 - Identification and Authentication Failures
      category: security
      technology:
        - go
        - database-sql
        - gorm
        - redis
      likelihood: HIGH
      impact: HIGH
      confidence: HIGH
      subcategory:
        - vuln

  # ---------------------------------------------------------------------------
  # Hardcoded JWT signing key
  # ---------------------------------------------------------------------------
  - id: go-hardcoded-jwt-secret
    patterns:
      - pattern-either:
          - pattern: jwt.NewWithClaims($METHOD, $CLAIMS).SignedString([]byte("..."))
          - pattern: |
              $TOKEN.SignedString([]byte("..."))
          - patterns:
              - pattern: |
                  $SECRET := []byte("...")
              - pattern-not: |
                  $SECRET := []byte("")
    message: >
      JWT signing key is hardcoded in source code. An attacker with access
      to the source code could forge tokens.
      Use environment variables or a secret manager.
    severity: ERROR
    languages: [go]
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
        - "CWE-321: Use of Hard-coded Cryptographic Key"
      owasp:
        - A02:2021 - Cryptographic Failures
        - A07:2021 - Identification and Authentication Failures
      category: security
      technology:
        - go
        - jwt
      likelihood: HIGH
      impact: HIGH
      confidence: HIGH
      subcategory:
        - vuln
