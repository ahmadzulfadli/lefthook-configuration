# =============================================================================
# Semgrep Custom Rules - Code Quality & Error Handling (Go)
# For Go projects
# Ref: - https://go.dev/doc/effective_go
#      - https://go.dev/blog/error-handling-and-go
# =============================================================================
rules:
  # ---------------------------------------------------------------------------
  # Ignored error (blank identifier for error)
  # ---------------------------------------------------------------------------
  - id: go-ignored-error
    patterns:
      - pattern-either:
          - pattern: |
              $VAL, _ := $FUNC(...)
          - pattern: |
              _, _ = $FUNC(...)
      - pattern-not: |
          $VAL, _ := os.LookupEnv(...)
      - pattern-not: |
          $VAL, _ := $MAP[$KEY]
      - pattern-not-inside: |
          // nolint
          ...
    message: >
      Error from '$FUNC(...)' is ignored using blank identifier.
      Always handle errors at minimum with logging. Silent failures make
      debugging in production difficult. If intentional, add a comment.
    severity: ERROR
    languages: [go]
    metadata:
      cwe:
        - "CWE-390: Detection of Error Condition Without Action"
      references:
        - https://go.dev/blog/error-handling-and-go
        - https://go.dev/doc/effective_go#errors
      category: best-practice
      technology:
        - go
      confidence: MEDIUM
      subcategory:
        - audit

  # ---------------------------------------------------------------------------
  # Use structured logger instead of fmt.Println/log.Println
  # ---------------------------------------------------------------------------
  - id: go-use-structured-logger
    patterns:
      - pattern-either:
          - pattern: fmt.Println(...)
          - pattern: fmt.Printf(...)
          - pattern: fmt.Fprintf(os.Stdout, ...)
          - pattern: fmt.Fprintf(os.Stderr, ...)
          - pattern: log.Println(...)
          - pattern: log.Printf(...)
          - pattern: log.Fatal(...)
          - pattern: log.Fatalf(...)
      - pattern-not-inside: |
          func main() {
            ...
          }
      - pattern-not-inside: |
          func TestMain(...) {
            ...
          }
    message: >
      Use a structured logger (zerolog, zap, slog) instead of fmt.Print* or
      log.Print* for production code. Structured logging provides log levels,
      JSON format, and proper context fields for observability.
    severity: ERROR
    languages: [go]
    metadata:
      references:
        - https://pkg.go.dev/log/slog
        - https://github.com/rs/zerolog
        - https://github.com/uber-go/zap
      category: best-practice
      technology:
        - go
      confidence: MEDIUM
      subcategory:
        - audit

  # ---------------------------------------------------------------------------
  # Defer in loop (potential resource leak)
  # ---------------------------------------------------------------------------
  - id: go-defer-in-loop
    patterns:
      - pattern-inside: |
          for ... {
            ...
          }
      - pattern: defer $FUNC(...)
    message: >
      'defer' inside a loop will not execute until the function returns,
      not on each iteration. This can cause resource leaks
      (file handles, connections, locks). Consider calling cleanup explicitly
      or wrapping in an anonymous function.
    severity: ERROR
    languages: [go]
    metadata:
      cwe:
        - "CWE-404: Improper Resource Shutdown or Release"
      references:
        - https://go.dev/doc/effective_go#defer
      category: best-practice
      technology:
        - go
      likelihood: MEDIUM
      impact: MEDIUM
      confidence: HIGH
      subcategory:
        - vuln

  # ---------------------------------------------------------------------------
  # Goroutine without recover (panic can crash entire program)
  # ---------------------------------------------------------------------------
  - id: go-goroutine-without-recover
    patterns:
      - pattern: |
          go func(...) {
            ...
          }(...)
      - pattern-not: |
          go func(...) {
            defer func() {
              ...
              recover()
              ...
            }()
            ...
          }(...)
      - pattern-not: |
          go func(...) {
            defer $RECOVER(...)
            ...
          }(...)
    message: >
      Goroutine without recover(). An unrecovered panic in a goroutine
      will crash the entire program. Add defer with recover() or
      use a wrapper function that handles panics.
    severity: ERROR
    languages: [go]
    metadata:
      cwe:
        - "CWE-248: Uncaught Exception"
      references:
        - https://go.dev/blog/defer-panic-and-recover
      category: best-practice
      technology:
        - go
      likelihood: MEDIUM
      impact: HIGH
      confidence: MEDIUM
      subcategory:
        - audit

  # ---------------------------------------------------------------------------
  # Context.Background() in HTTP handler (should use request context)
  # ---------------------------------------------------------------------------
  - id: go-context-background-in-handler
    patterns:
      - pattern: context.Background()
      - pattern-inside: |
          func $FUNC(..., $R *http.Request, ...) {
            ...
          }
    message: >
      Using context.Background() inside an HTTP handler. Use $R.Context()
      so the context follows the request lifecycle (timeout, cancellation).
      This is important for proper resource cleanup.
    severity: ERROR
    languages: [go]
    metadata:
      references:
        - https://pkg.go.dev/context
        - https://go.dev/blog/context
      category: best-practice
      technology:
        - go
      confidence: HIGH
      subcategory:
        - audit
