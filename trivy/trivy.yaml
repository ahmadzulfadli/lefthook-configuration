# =============================================================================
# Trivy Configuration - trivy.yaml (Trivy v0.72.0)
# Supported languages: Java/Spring Boot, Go
# Reference: https://trivy.dev/latest/docs/references/configuration/config-file/
# =============================================================================

# --- Report options (top-level) ---
severity:
  - HIGH
  - CRITICAL

format: "table"
exit-code: 1

# --- Scan options ---
scan:
  scanners:
    - vuln
    - secret
  #    - misconfig

  skip-dirs:
    # Common
    - .idea
    - .vscode
    - .github
    - .git
    - node_modules

    # Java/Maven/Gradle
    - .mvn
    - target/classes
    - target/test-classes
    - loadtests

    # Go
    - vendor
    - bin
    - dist
    - testdata
    - mocks

  skip-files:
    # Java/Maven
    - "mvnw"
    - "mvnw.cmd"

    # Common
    - "Dockerfile"

    # Go - generated files
    - "**/*.pb.go"
    - "**/*_generated.go"
    - "**/mock_*.go"

# --- Package options (replaces deprecated vulnerability.type) ---
pkg:
  types:
    - os
    - library

# --- Misconfiguration options ---
#misconfiguration:
#  scanners:
#    - dockerfile
#    - kubernetes
